RFCQuic:
  type: misc 
  series: "Request for Comments"
  number: 9000
  howpublished: "RFC 9000"
  publisher: RFC Editor
  doi: {10.17487/RFC9000}
  url: "https://www.rfc-editor.org/info/rfc9000"
  author: Jana Iyengar and Martin Thomson
  title: "QUIC: A UDP-Based Multiplexed and Secure Transport"
  pagetotal: 151
  year: 2021
  month: may
  abstract: "This document defines the core of the QUIC transport protocol. QUIC provides applications with flow-controlled streams for structured communication, low-latency connection establishment, and network path migration. QUIC includes security measures that ensure confidentiality, integrity, and availability in a range of deployment circumstances. Accompanying documents describe the integration of TLS for key negotiation, loss detection, and an exemplary congestion control algorithm"
Multipath:
  type: Report
  title: Managing multiple paths for a QUIC connection
  authors:
    - family-names: Liu
      given-names: Yanmei
    - family-names: Ma
      given-names: Yunfei
    - family-names: De Coninck
      given-names: Quentin
    - family-names: Bonaventure
      given-names: Olivier
    - family-names: Huitema
      given-names: Christian
    - family-names: Kühlewind
      given-names: Mirja
  serial-number:
    name: Internet-Draft
    value: draft-ietf-quic-multipath-21
  publisher: Internet Engineering Task Force
  organization: Internet Engineering Task Force
  date: 2026-03-17
  url: https://datatracker.ietf.org/doc/draft-ietf-quic-multipath/21/
  page-total: 42
  note: Work in Progress
  abstract: >
    This document specifies a multipath extension for the QUIC protocol to
    enable the simultaneous usage of multiple paths for a single connection.
    It introduces explicit path identifiers to create, delete, and manage
    multiple paths. This document does not specify address discovery or
    management, nor how applications using QUIC schedule traffic over multiple
    paths. 
